<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真心话大冒险 - 情侣版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-truth {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-dare {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .result-card {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 20px;
            padding: 30px;
            min-height: 200px;
            display: block;
            animation: slideIn 0.5s ease;
            margin-top: 20px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-type {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 15px;
        }

        .result-content {
            font-size: 1.4em;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
        }

        .level-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .level-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .level-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-color: transparent;
        }

        .emoji {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .next-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .next-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕 真心话大冒险</h1>
        <p class="subtitle">情侣专属版</p>

        <div class="level-selector">
            <button class="level-btn active" data-level="mild">温柔版</button>
            <button class="level-btn" data-level="spicy">火辣版</button>
            <button class="level-btn" data-level="wild">狂野版</button>
        </div>

        <div class="button-group">
            <button class="btn btn-truth" onclick="showTruth()">
                💭<br>真心话
            </button>
            <button class="btn btn-dare" onclick="showDare()">
                🎯<br>大冒险
            </button>
        </div>

        <div class="result-card" id="resultCard">
            <div class="emoji" id="emoji">💝</div>
            <div class="result-type" id="resultType">点击上方按钮开始游戏</div>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <script>
        let currentLevel = 'mild';

        const questions = {
            truth: {
                mild: [
                    "你最喜欢我身上的哪个部位？为什么？",
                    "你有没有偷偷看过我的手机？看到了什么？",
                    "你有没有对我撒过谎？最大的谎言是什么？",
                    "你有没有因为想我而自慰过？",
                    "你觉得我们之间最性感的时刻是什么时候？",
                    "你有没有在朋友面前吹嘘过我们的床事？",
                    "你最想改变我的哪一点？身材还是性格？",
                    "你有没有幻想过和别人做爱的时候想到我？",
                    "你觉得我接吻技术怎么样？打几分？",
                    "你有没有在我面前假装过高潮？"
                ],
                spicy: [
                    "你对我们第一次做爱有什么真实感受？满意吗？",
                    "你最想尝试但不敢说的性爱姿势是什么？",
                    "你觉得我身体最让你兴奋的部位是哪里？",
                    "你有没有幻想过在公共场合和我做爱？哪里？",
                    "你最喜欢我穿什么样的内衣？或者不穿？",
                    "你看片的时候会想象是我和你吗？",
                    "你觉得我们做爱时最刺激的是哪一次？为什么？",
                    "你有没有在见我之前特意自慰，怕自己太快？",
                    "你最想让我用嘴对你做什么？",
                    "你做过最色的梦是关于我的吗？梦到了什么？"
                ],
                wild: [
                    "说出你最变态的性幻想，越详细越好。",
                    "你自慰的频率是多少？每次都想着我吗？",
                    "你最想在哪里和我做爱？为什么那里让你兴奋？",
                    "你觉得我床上表现打几分？哪里让你不满意？",
                    "你有没有想过3P或者换妻？和谁？",
                    "你看过的片子里，最想和我重现的是哪个场景？",
                    "你有没有闻过我的内裤或者其他私密物品？",
                    "你最想听我在床上对你说什么脏话？",
                    "你想和我玩什么角色扮演？老师学生还是主人奴隶？",
                    "你有没有偷拍过我的裸照或者做爱视频？"
                ]
            },
            dare: {
                mild: [
                    "给对方一个深情的拥抱，持续30秒，手要放在臀部",
                    "对着对方的眼睛说'我想要你'三遍",
                    "亲吻对方的脖子10秒",
                    "给对方发一条你最色的幻想",
                    "让对方躺在你腿上，抚摸TA的头发和脸5分钟",
                    "和对方舌吻1分钟，不许停",
                    "脱掉一件衣服",
                    "让对方摸你身体任意一个部位30秒",
                    "咬对方的嘴唇",
                    "给对方喂一口食物，用嘴"
                ],
                spicy: [
                    "亲吻对方的胸部10秒，隔着衣服",
                    "咬对方的耳朵并且吹气",
                    "让对方坐在你腿上，面对面拥抱2分钟",
                    "脱掉上衣，让对方亲吻你的身体",
                    "用舌头舔对方的脖子到锁骨",
                    "把手伸进对方的衣服里，抚摸胸部1分钟",
                    "亲吻对方的大腿内侧",
                    "让对方躺下，你趴在TA身上磨蹭",
                    "用手指轻轻划过对方的敏感部位",
                    "给对方一个法式湿吻，要有声音"
                ],
                wild: [
                    "脱到只剩内衣，让对方欣赏并抚摸",
                    "让对方用嘴咬开你的内衣扣或皮带",
                    "亲吻对方身体的任意三个部位，包括私密部位",
                    "给对方口交的前戏，隔着内裤",
                    "让对方坐在你腿上，模拟做爱动作1分钟",
                    "用冰块含在嘴里，然后亲吻对方的乳头",
                    "让对方躺下，你用嘴唇从脖子吻到下体",
                    "完全脱光，让对方随意触摸2分钟",
                    "给对方口交，至少1分钟",
                    "现在就做爱，任何姿势都可以"
                ]
            }
        };

        // 切换难度等级
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLevel = this.dataset.level;
            });
        });

        function showTruth() {
            const truthList = questions.truth[currentLevel];
            const randomTruth = truthList[Math.floor(Math.random() * truthList.length)];

            document.getElementById('emoji').textContent = '💭';
            document.getElementById('resultType').textContent = '真心话';
            document.getElementById('resultContent').textContent = randomTruth;
        }

        function showDare() {
            const dareList = questions.dare[currentLevel];
            const randomDare = dareList[Math.floor(Math.random() * dareList.length)];

            document.getElementById('emoji').textContent = '🎯';
            document.getElementById('resultType').textContent = '大冒险';
            document.getElementById('resultContent').textContent = randomDare;
        }
    </script>
</body>
</html><!-- Updated -->
